<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo | Smart Africa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-white p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-black text-orange-500 text-center mb-10 italic">Smart Africa</h1>
        <div id="formContainer" class="bg-slate-900 p-8 rounded-[40px] border border-slate-800 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-center">Inscrição de Prestador</h2>
            <div class="space-y-4">
                <input type="text" id="regNome" placeholder="Nome do Negócio" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500">
                <select id="regCat" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-slate-400">
                    <option value="❄️ FRIO">❄️ Frio & AC</option>
                    <option value="⚡ ELÉCTRICA">⚡ Eléctrica</option>
                    <option value="🚰 CANALIZADOR">🚰 Canalizador</option>
                </select>
                <input type="tel" id="regTel" placeholder="WhatsApp (+258...)" class="w-full bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="obterLocalizacao()" id="btnLoc" class="w-full text-xs text-orange-500 font-bold border border-orange-500/30 py-3 rounded-full uppercase">
                    📍 Partilhar Localização GPS
                </button>
                <button onclick="registarArtisao()" class="w-full bg-orange-600 py-5 rounded-2xl font-black uppercase mt-4">
                    Criar Minha Conta (Ganha 500 MT)
                </button>
            </div>
        </div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAK5TZRYq8xsdYrJmjHMFBSCaN55Z_HtBc", authDomain: "mozambique-services.firebaseapp.com", projectId: "mozambique-services", storageBucket: "mozambique-services.firebasestorage.app", messagingSenderId: "432836284981", appId: "1:432836284981:web:19fb3c67a9b8808e7e577c" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userCoords = null;
        function obtenirLocalizacao() {
            navigator.geolocation.getCurrentPosition((pos) => {
                userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                document.getElementById('btnLoc').innerText = "✅ LOCALIZAÇÃO PRONTA";
            });
        }
        async function registarArtisao() {
            const nome = document.getElementById('regNome').value;
            const cat = document.getElementById('regCat').value;
            const tel = document.getElementById('regTel').value;
            if (!nome || !tel || !userCoords) return alert("Preencha tudo e partilhe o GPS!");
            await db.collection('artisans').add({ nome, cat, tel, lat: userCoords.lat, lng: userCoords.lng, saldo: 500 });
            alert("Conta Criada!"); window.location.href = "index.html";
        }
    </script>
</body>
                                                        </html>
