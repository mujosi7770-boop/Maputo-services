<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Smart Africa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-md mx-auto text-center">
        <h2 class="text-2xl font-black text-orange-500 mb-8 uppercase">Gestão de Saldo</h2>

        <div id="perfilData" class="bg-slate-800 p-8 rounded-[30px] border border-slate-700 mb-6">
            <p class="text-slate-400 text-xs uppercase font-bold mb-1">Saldo Actual</p>
            <h1 id="saldo" class="text-5xl font-black text-white mb-6">0 <span class="text-lg text-orange-500">MT</span></h1>
            
            <div class="text-left space-y-2 border-t border-slate-700 pt-6">
                <p class="text-sm"><strong>Nome:</strong> <span id="nomeDisplay">...</span></p>
                <p class="text-sm"><strong>Serviço:</strong> <span id="catDisplay">...</span></p>
            </div>
        </div>

        <button onclick="alert('Funcionalidade e-Mola em breve!')" class="w-full py-5 bg-green-600 rounded-2xl font-black uppercase text-sm mb-4">
            Recarregar via e-Mola / M-Pesa
        </button>
        
        <a href="index.html" class="block text-slate-500 text-sm font-bold uppercase py-4">Voltar ao Início</a>
    </div>

    <script>
        // Utiliser la même config Firebase
        const firebaseConfig = { /* Ta config ici */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Pour le test, on cherche l'artisan par son numéro de téléphone (à adapter selon ton système de login)
        async function carregarPerfil(telefone) {
            const snap = await db.collection('artisans').where('tel', '==', telefone).get();
            
            if (!snap.empty) {
                const data = snap.docs[0].data();
                // LE TRADUCTEUR MAGIQUE ICI
                document.getElementById('saldo').innerText = (data.saldo || 0);
                document.getElementById('nomeDisplay').innerText = data.nome;
                document.getElementById('catDisplay').innerText = data.cat || data.categoria;
            } else {
                alert("Profissional não encontrado.");
            }
        }

        // Simule un chargement (à remplacer par ton système d'ID réel)
        const userTel = prompt("Digite seu telefone para ver o saldo:");
        if(userTel) carregarPerfil(userTel);
    </script>
</body>
</html>
