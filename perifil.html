<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo | Smart Africa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-md mx-auto">
        <h2 class="text-2xl font-black text-orange-500 uppercase mb-6 text-center">Registo Profissional</h2>
        
        <form id="regForm" class="space-y-4">
            <input type="text" id="nome" placeholder="Nome Completo / Empresa" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none focus:border-orange-500" required>
            
            <select id="cat" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none focus:border-orange-500" required>
                <option value="">Escolha a Categoria</option>
                <option value="❄️ FRIO">❄️ Frio (AC/Frigorífico)</option>
                <option value="⚡ ELÉCTRICA">⚡ Eléctrica</option>
                <option value="🚰 CANALIZADOR">🚰 Canalizador</option>
                <option value="🧹 LIMPEZA">🧹 Limpeza</option>
                <option value="📺 ELECTRÓNICA">📺 Electrónica / TV</option>
            </select>

            <input type="text" id="bairro" placeholder="Seu Bairro (ex: Matola T3)" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none focus:border-orange-500" required>
            <input type="tel" id="tel" placeholder="Telefone (ex: 25884...)" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none focus:border-orange-500" required>
            
            <button type="submit" class="w-full py-4 bg-orange-600 rounded-2xl font-black uppercase shadow-lg shadow-orange-900/20 active:scale-95 transition-all">
                Criar Perfil
            </button>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAK5TZRYq8xsdYrJmjHMFBSCaN55Z_HtBc",
            authDomain: "mozambique-services.firebaseapp.com",
            projectId: "mozambique-services",
            storageBucket: "mozambique-services.firebasestorage.app",
            messagingSenderId: "432836284981",
            appId: "1:432836284981:web:19fb3c67a9b8808e7e577c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const novoArtisan = {
                nome: document.getElementById('nome').value,
                cat: document.getElementById('cat').value,
                bairro: document.getElementById('bairro').value,
                tel: document.getElementById('tel').value.replace(/\D/g, ''),
                saldo: 100, // Bonus de boas-vindas
                data: new Date().toISOString()
            };

            try {
                await db.collection('artisans').add(novoArtisan);
                alert("Perfil criado com sucesso! Agora você aparecerá na lista.");
                window.location.href = "index.html";
            } catch (err) {
                alert("Erro ao registar: " + err.message);
            }
        };
    </script>
</body>
    </html>
