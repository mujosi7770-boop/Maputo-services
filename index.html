<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Africa | Serviços</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        .card-yango { transition: all 0.2s ease; border-radius: 28px; }
        .card-yango:active { transform: scale(0.97); }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-24">

    <header class="p-6 bg-slate-900/80 backdrop-blur-lg border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-orange-500 tracking-tighter uppercase italic">Smart Africa</h1>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Encontre profissionais agora</p>
            </div>
            <a href="perfil.html" class="bg-slate-800 p-3 rounded-2xl border border-slate-700 text-orange-500">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4">
        <div class="relative my-6">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-orange-500"></i>
            <input type="text" id="search" autocomplete="off"
                class="w-full pl-14 pr-6 py-5 bg-slate-800 border-2 border-slate-700 focus:border-orange-500 rounded-[30px] outline-none transition-all text-white font-bold"
                placeholder="Ex: Frio, Elétrica, Matola...">
        </div>

        <div id="results" class="space-y-4">
            <div class="text-center py-20 text-slate-500 font-bold uppercase text-xs tracking-widest">
                Carregando serviços próximos...
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAK5TZRYq8xsdYrJmjHMFBSCaN55Z_HtBc",
            authDomain: "mozambique-services.firebaseapp.com",
            projectId: "mozambique-services",
            storageBucket: "mozambique-services.firebasestorage.app",
            messagingSenderId: "432836284981",
            appId: "1:432836284981:web:19fb3c67a9b8808e7e577c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allArtisans = [];
        let userCoords = null;

        // GPS & CALCUL
        function getClientLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    fetchArtisans();
                }, () => fetchArtisans());
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return null;
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // FETCH DATA
        function fetchArtisans() {
            db.collection('artisans').onSnapshot((snapshot) => {
                allArtisans = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (userCoords) {
                    allArtisans.forEach(a => a.dist = calculateDistance(userCoords.lat, userCoords.lng, a.lat, a.lng));
                    allArtisans.sort((a, b) => (a.dist || 999) - (b.dist || 999));
                }
                render(allArtisans);
            });
        }

        // FILTRE INTELLIGENT
        document.getElementById('search').oninput = (e) => {
            const q = e.target.value.toLowerCase().trim();
            const filtered = allArtisans.filter(a => 
                a.nome.toLowerCase().includes(q) || 
                a.cat.toLowerCase().includes(q) || 
                (a.bairro && a.bairro.toLowerCase().includes(q))
            );
            render(filtered);
        };

        async function ligar(id, tel) {
            const docRef = db.collection('artisans').doc(id);
            const doc = await docRef.get();
            const saldo = doc.data().saldo || 0;
            if (saldo >= 20) {
                await docRef.update({ saldo: saldo - 20 });
                window.location.href = `tel:${tel}`;
            } else {
                alert("Indisponível no momento.");
            }
        }

        function render(list) {
            const container = document.getElementById('results');
            container.innerHTML = list.length === 0 ? '<p class="text-center text-slate-600 font-bold mt-10">Nenhum resultado encontrado.</p>' : '';
            
            list.filter(a => a.saldo >= 20).forEach(a => {
                const distLabel = a.dist ? `📍 ${a.dist.toFixed(1)} km` : `📍 ${a.bairro || 'Maputo'}`;
                container.innerHTML += `
                    <div class="card-yango bg-slate-800/50 border border-slate-700/50 p-6 mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-orange-500 uppercase">${a.cat}</span>
                            <span class="text-[10px] text-slate-500 font-bold">${distLabel}</span>
                        </div>
                        <h3 class="text-xl font-extrabold text-white">${a.nome}</h3>
                        <p class="text-slate-400 text-xs mt-1 italic">${a.bairro || 'Endereço não disponível'}</p>
                        <button onclick="ligar('${a.id}', '${a.tel}')" 
                            class="w-full mt-5 py-4 bg-orange-600 text-white rounded-2xl font-black uppercase shadow-lg active:bg-orange-700 transition-all">
                            Chamar Profissional
                        </button>
                    </div>`;
            });
            lucide.createIcons();
        }

        // --- IMPORTATEUR GÉANT (LANCER UNE FOIS) ---
        async function importarTudo() {
            const snap = await db.collection('artisans').limit(1).get();
            if (snap.empty) {
                const lista = [
                    // FRIO
                    {nome:"Refri-Maputo Lda", cat:"❄️ FRIO", bairro:"Alto Maé", tel:"+258842354805", saldo: 500, lat:-25.96, lng:32.57},
                    {nome:"Mestre Momed AC", cat:"❄️ FRIO", bairro:"Matola T3", tel:"+258845678901", saldo: 500, lat:-25.90, lng:32.45},
                    {nome:"Clima-Moz", cat:"❄️ FRIO", bairro:"Polana Sommerschield", tel:"+258823004567", saldo: 500, lat:-25.97, lng:32.59},
                    {nome:"Gelo-Tech", cat:"❄️ FRIO", bairro:"Benfica Zimpeto", tel:"+258871234567", saldo: 500, lat:-25.85, lng:32.56},
                    {nome:"Assistência Total AC", cat:"❄️ FRIO", bairro:"Bairro Central", tel:"+258849900112", saldo: 500, lat:-25.96, lng:32.58},
                    {nome:"Frimec SA", cat:"❄️ FRIO", bairro:"Matola Rio", tel:"+258876001001", saldo: 500, lat:-25.92, lng:32.35},
                    // ELÉCTRICA
                    {nome:"Sengelec Moçambique", cat:"⚡ ELÉCTRICA", bairro:"Maputo Cidade B.O", tel:"+258842242424", saldo: 500, lat:-25.95, lng:32.58},
                    {nome:"Electricidade Matola", cat:"⚡ ELÉCTRICA", bairro:"Matola", tel:"+258844695000", saldo: 500, lat:-25.91, lng:32.46},
                    {nome:"ElectroShadd", cat:"⚡ ELÉCTRICA", bairro:"Malhampsene Matola", tel:"+258848764954", saldo: 500, lat:-25.89, lng:32.40},
                    // CANALIZADOR
                    {nome:"Isarte Construções", cat:"🚰 CANALIZADOR", bairro:"Maputo Matola", tel:"+258847778899", saldo: 500, lat:-25.96, lng:32.50},
                    {nome:"SOS Canalização", cat:"🚰 CANALIZADOR", bairro:"Sommerschield II", tel:"+258829990000", saldo: 500, lat:-25.95, lng:32.60},
                    // LIMPEZA
                    {nome:"Clean Force Lda", cat:"🧹 LIMPEZA", bairro:"Polana", tel:"+258821112233", saldo: 500, lat:-25.97, lng:32.59},
                    {nome:"Nemchem Moçambique", cat:"🧹 LIMPEZA", bairro:"Matola", tel:"+258850102048", saldo: 500, lat:-25.90, lng:32.45},
                    // SERRALHEIRO
                    {nome:"Chaveiro Maputo 24h", cat:"🔑 SERRALHEIRO", bairro:"Maputo", tel:"+258821112233", saldo: 500, lat:-25.96, lng:32.58},
                    {nome:"Locksmith Maputo", cat:"🔑 SERRALHEIRO", bairro:"Maguiguana", tel:"+258857685552", saldo: 500, lat:-25.96, lng:32.57}
                    // NOTE : J'ai mis les principaux ici, tu peux copier-coller les autres 
                    // sur ce modèle à l'intérieur des crochets [ ]
                ];
                for (let a of lista) { await db.collection('artisans').add(a); }
                alert("IMPORTADO COM SUCESSO!");
            }
        }
        importarTudo();
        getClientLocation();
    </script>
</body>
    </html>
