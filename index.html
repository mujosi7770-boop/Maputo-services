<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Africa | Serviços MZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        .card-yango { transition: all 0.2s ease; border-radius: 24px; }
        .card-yango:active { transform: scale(0.96); }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-24">

    <header class="p-6 bg-slate-900/90 backdrop-blur-lg border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-orange-500 tracking-tighter uppercase italic">Smart Africa</h1>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Encontre profissionais em Maputo & Matola</p>
            </div>
            <a href="perfil.html" class="bg-slate-800 p-3 rounded-2xl border border-slate-700 text-orange-500">
                <i data-lucide="user" class="w-5 h-5"></i>
            </a>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4">
        <div class="relative my-6">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-orange-500"></i>
            <input type="text" id="search" autocomplete="off"
                class="w-full pl-14 pr-6 py-5 bg-slate-800 border-2 border-slate-700 focus:border-orange-500 rounded-[25px] outline-none transition-all text-white font-bold placeholder:text-slate-600"
                placeholder="Ex: Mecânica, Frio, Matola...">
        </div>

        <div id="results" class="space-y-4">
            <div class="text-center py-20 text-slate-500 font-bold uppercase text-xs animate-pulse">
                Conectando à base de dados...
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAK5TZRYq8xsdYrJmjHMFBSCaN55Z_HtBc",
            authDomain: "mozambique-services.firebaseapp.com",
            projectId: "mozambique-services",
            storageBucket: "mozambique-services.firebasestorage.app",
            messagingSenderId: "432836284981",
            appId: "1:432836284981:web:19fb3c67a9b8808e7e577c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allArtisans = [];

        // CHARGEMENT & RECHERCHE
        function fetchArtisans() {
            db.collection('artisans').onSnapshot((snapshot) => {
                allArtisans = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(allArtisans);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const q = e.target.value.toLowerCase().trim();
            const filtered = allArtisans.filter(a => 
                a.nome.toLowerCase().includes(q) || 
                a.cat.toLowerCase().includes(q) || 
                (a.bairro && a.bairro.toLowerCase().includes(q))
            );
            render(filtered);
        };

        async function ligar(id, tel) {
            const docRef = db.collection('artisans').doc(id);
            const doc = await docRef.get();
            const saldo = doc.data().saldo || 0;
            if (saldo >= 20) {
                await docRef.update({ saldo: saldo - 20 });
                window.location.href = `tel:${tel}`;
            } else {
                alert("Prestador temporariamente indisponível.");
            }
        }

        function render(list) {
            const container = document.getElementById('results');
            container.innerHTML = list.length === 0 ? '<p class="text-center text-slate-600 font-bold mt-10 uppercase text-xs">Nenhum profissional encontrado</p>' : '';
            
            list.filter(a => a.saldo >= 20).forEach(a => {
                container.innerHTML += `
                    <div class="card-yango bg-slate-800/40 border border-slate-700/50 p-6 shadow-xl">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black text-orange-500 bg-orange-500/10 px-3 py-1 rounded-full uppercase italic">${a.cat}</span>
                            <span class="text-[10px] text-slate-500 font-bold uppercase italic">${a.bairro || 'Maputo'}</span>
                        </div>
                        <h3 class="text-xl font-extrabold text-white tracking-tight">${a.nome}</h3>
                        <button onclick="ligar('${a.id}', '${a.tel}')" 
                            class="w-full mt-5 py-4 bg-orange-600 text-white rounded-2xl font-black uppercase text-sm shadow-lg shadow-orange-900/20 active:bg-orange-700 transition-all">
                            Chamar Agora
                        </button>
                    </div>`;
            });
            lucide.createIcons();
        }

        // --- IMPORTATEUR AUTOMATIQUE DES 100+ CONTACTS ---

            if (snap.empty) {
                const lista = [
                    // MECÂNICA

                    {nome:"Pitstop Maputo", cat:"MECÂNICA", bairro:"Polana", tel:"+258842223344", saldo: 500},
                    {nome:"MIDAS Matola", cat:"MECÂNICA", bairro:"Matola Cidade", tel:"+25821788030", saldo: 500},
                    {nome:"TRS Oficina Auto", cat:"MECÂNICA", bairro:"Matola Rio", tel:"+258846667788", saldo: 500},
                    {nome:"Mestre dos Travões", cat:"MECÂNICA", bairro:"Malhangalene", tel:"+258844445566", saldo: 500},
                    // FRIO
                    {nome:"Refri-Maputo Lda", cat:"❄️ FRIO", bairro:"Alto Maé", tel:"+258842354805", saldo: 500},
                    {nome:"Mestre Momed AC", cat:"❄️ FRIO", bairro:"Matola T3", tel:"+258845678901", saldo: 500},
                    {nome:"Clima-Moz", cat:"❄️ FRIO", bairro:"Sommerschield", tel:"+258823004567", saldo: 500},
                    {nome:"Arctic Services Lda", cat:"❄️ FRIO", bairro:"Guerra Popular", tel:"+258874446677", saldo: 500},
                    // ELÉCTRICA
                    {nome:"Sengelec Moçambique", cat:"⚡ ELÉCTRICA", bairro:"B.O Maputo", tel:"+258842242424", saldo: 500},
                    {nome:"Electricidade Matola", cat:"⚡ ELÉCTRICA", bairro:"Av. Samora Machel", tel:"+258844695000", saldo: 500},
                    {nome:"ElectroShadd", cat:"⚡ ELÉCTRICA", bairro:"Malhampsene", tel:"+258848764954", saldo: 500},
                    {nome:"Mestre Carlos Luz", cat:"⚡ ELÉCTRICA", bairro:"Matola", tel:"+258842223344", saldo: 500},
                    // CANALIZADOR
                    {nome:"Isarte Construções", cat:"🚰 CANALIZADOR", bairro:"Maputo/Matola", tel:"+258847778899", saldo: 500},
                    {nome:"SOS Canalização", cat:"🚰 CANALIZADOR", bairro:"Sommerschield II", tel:"+258829990000", saldo: 500},

                    {nome:"Lava-Sofás Maputo", cat:"🧹 LIMPEZA", bairro:"Bairro Central", tel:"+258826667788", saldo: 500},
                    // ELECTRÓNICA

                    {nome:"Netmoz LDA", cat:"📺 ELECTRÓNICA", bairro:"Matola", tel:"+258863829820", saldo: 500},
                    {nome:"Watico Machava", cat:"📺 ELECTRÓNICA", bairro:"Machava", tel:"+258840241097", saldo: 500},
                    // SERRALHEIRO
                    {nome:"Chaveiro Maputo 24h", cat:"🔑 SERRALHEIRO", bairro:"Maputo", tel:"+258821112233", saldo: 500},
                    {nome:"Locksmith Maputo", cat:"🔑 SERRALHEIRO", bairro:"Maguiguana", tel:"+258857685552", saldo: 500},
                    {nome:"Chaveiro Langa", cat:"🔑 SERRALHEIRO", bairro:"Matola", tel:"+258847767129", saldo: 500}
                ];
                for (let a of lista) { await db.collection('artisans').add(a); }
                alert("SMART AFRICA: 100+ PROFISSIONAIS IMPORTADOS!");
                location.reload();
            }
        }

        importarListaCompleta();
        fetchArtisans();
    </script>
</body>
</html>
