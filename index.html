<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Africa | Serviços Profissionais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .card-yango { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border-radius: 28px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
    </style>
</head>
<body>

    <header class="p-6 sticky top-0 bg-slate-900/80 backdrop-blur-md z-50 border-b border-slate-800">
        <h1 class="text-2xl font-black text-orange-500 italic uppercase tracking-tighter">Smart Africa</h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase">Maputo • Matola • Boane</p>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div class="relative mb-8">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-orange-500 w-5 h-5"></i>
            <input type="text" id="search" placeholder="Procurar (frio, eletricista, bairro...)" 
                class="w-full bg-slate-800 border-2 border-slate-700 p-5 pl-14 rounded-[25px] outline-none focus:border-orange-500 font-bold transition-all">
        </div>

        <div id="results" class="space-y-4">
            </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAK5TZRYq8xsdYrJmjHMFBSCaN55Z_HtBc",
            authDomain: "mozambique-services.firebaseapp.com",
            projectId: "mozambique-services",
            storageBucket: "mozambique-services.firebasestorage.app",
            messagingSenderId: "432836284981",
            appId: "1:432836284981:web:19fb3c67a9b8808e7e577c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allArtisans = [];

        // RÉCUPÉRATION DES DONNÉES
        function fetchArtisans() {
            db.collection('artisans').onSnapshot(snap => {
                allArtisans = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render(allArtisans);
            });
        }

        // FILTRAGE ET RECHERCHE
        document.getElementById('search').oninput = (e) => {
            const q = e.target.value.toLowerCase().trim();
            if (q === "admin123") { executarMagia(); e.target.value=""; return; }

            const filtered = allArtisans.filter(a => {
                const nom = (a.nome || "").toLowerCase();
                const cat = (a.cat || a.categoria || "").toLowerCase();
                const zone = (a.bairro || a.localidade || "").toLowerCase();
                return nom.includes(q) || cat.includes(q) || zone.includes(q);
            });
            render(filtered);
        };

        // SYSTÈME DE CONTACT (APPEL + WHATSAPP)
        async function ligar(id, tel) {
            const docRef = db.collection('artisans').doc(id);
            const doc = await docRef.get();
            const data = doc.data();
            const s = data.saldo || 0;

            if (s >= 20) {
                await docRef.update({ saldo: s - 20 });
                
                const msg = `Olá ${data.nome}, vi seu perfil na *Smart Africa*. \nPreciso de ajuda com: \n\n(Descreva sua avaria aqui...)`;
                const whatsappUrl = `https://wa.me/${tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
                
                if (confirm("Deseja enviar detalhes da avaria por WhatsApp antes de ligar?")) {
                    window.open(whatsappUrl, '_blank');
                } else {
                    window.location.href = `tel:${tel}`;
                }
            } else {
                alert("Este profissional está temporariamente indisponível (Saldo insuficiente).");
            }
        }

        function render(list) {
            const container = document.getElementById('results');
            container.innerHTML = "";
            
            // On ne montre que ceux qui ont du crédit
            const actifs = list.filter(a => Number(a.saldo || 0) >= 20);

            actifs.forEach(a => {
                container.innerHTML += `
                <div class="card-yango p-6 mb-4">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black text-orange-500 bg-orange-500/10 px-3 py-1 rounded-full uppercase italic">
                            ${a.cat || a.categoria}
                        </span>
                        <span class="text-[10px] text-slate-500 font-bold uppercase">${a.bairro || a.localidade || 'Maputo'}</span>
                    </div>
                    <h3 class="text-xl font-extrabold text-white mb-6">${a.nome}</h3>
                    <button onclick="ligar('${a.id}', '${a.tel}')" 
                        class="w-full py-4 bg-orange-600 text-white rounded-2xl font-black uppercase text-sm shadow-lg shadow-orange-900/40 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="phone" class="w-4 h-4"></i> Chamar Agora
                    </button>
                </div>`;
            });
            lucide.createIcons();
        }

        // TA FONCTION D'IMPORTATION (MAGIE)
        async function executarMagia() {
            alert("Sincronizando...");
            // ... (Ici tu peux remettre ta liste de 100 noms si tu veux forcer une mise à jour)
        }

        fetchArtisans();
    </script>
</body>
</html>
